[package]
name = "gvm"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "gvm"
path = "src/main.rs"

[dependencies]
tokio       = { version = "1",    features = ["full"] }
clap        = { version = "4",    features = ["derive", "env"] }
anyhow      = "1"
thiserror   = "1"
reqwest     = { version = "0.11", features = ["json"] }
serde       = { version = "1",    features = ["derive"] }
serde_json  = "1"
gcp_auth    = "0.9"
colored     = "2"
